site_name: SAMINFO
site_description: Samsung device information tool
site_url: ""

repo_url: "https://github.com/yanuino/saminfo"
repo_name: yanuino/saminfo
# edit_uri: "edit/main/docs/"

strict: true
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets
  - pymdownx.magiclink

plugins:
  - search
  - macros
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            separate_signature: true
            members_order: source
            inherited_members: true
            filters: ["!^_"]
            heading_level: 2
  - git-revision-date-localized:
      type: timeago
      locale: en
      fallback_to_build_date: true

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/index.md
  - Device API: api/device.md

extra:
  generator: false
